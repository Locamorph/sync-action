name: Test Pull

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull translations
        uses: ./
        with:
          action: pull
          api_key: ${{ secrets.TEAAAMS_API_KEY }}

      - name: Show result
        run: |
          echo "=== Downloaded files ==="
          find . -name "*.json" -path "*/locales/*" 2>/dev/null | head -20 || echo "No files found"
          echo "=== Git status ==="
          git status --short
