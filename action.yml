name: 'Locamorph Sync Action'
description: 'Sync translations with Locamorph - pull, push, create PRs, or preview changes'
author: 'Locamorph'
branding:
  icon: 'globe'
  color: 'blue'

inputs:
  action:
    description: 'Action to perform: pull, push, pull-request, or preview'
    required: true
  api_key:
    description: 'Locamorph API key'
    required: true
  github_token:
    description: 'GitHub token (required for pull-request and preview actions)'
    required: false
  pr_title:
    description: 'PR title'
    required: false
    default: 'chore: update translations'
  pr_branch:
    description: 'PR branch name'
    required: false
    default: 'locamorph/translations-update'
  pr_base:
    description: 'Base branch for PR (defaults to repository default branch)'
    required: false
  pr_body:
    description: 'PR body/description'
    required: false
  pr_labels:
    description: 'Comma-separated labels'
    required: false
  pr_reviewers:
    description: 'Comma-separated reviewer usernames'
    required: false
  pr_assignees:
    description: 'Comma-separated assignee usernames'
    required: false
  comment_on_no_changes:
    description: 'Comment on the PR even when the preview finds no translation changes (preview action only)'
    required: false
    default: 'true'

outputs:
  has_changes:
    description: 'Whether any translation files changed'
    value: ${{ steps.pull-pr.outputs.has_changes }}
  pr_url:
    description: 'URL of created PR (pull-request action only)'
    value: ${{ steps.create-pr.outputs.pull-request-url }}
  pr_number:
    description: 'PR number (pull-request action only)'
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  preview_output:
    description: 'Markdown body of the preview comment (preview action only)'
    value: ${{ steps.preview.outputs.preview_output }}

runs:
  using: 'composite'
  steps:
    # Setup
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Locamorph CLI
      shell: bash
      run: |
        npm install -g "@locamorph/cli@^1.1.0"
        echo "Installed locamorph CLI version: $(locamorph --version)"

    # Action: pull
    - name: Pull translations
      if: inputs.action == 'pull'
      shell: bash
      env:
        LOCAMORPH_API_KEY: ${{ inputs.api_key }}
      run: locamorph download --verbose

    # Action: push
    - name: Push translations
      if: inputs.action == 'push'
      shell: bash
      env:
        LOCAMORPH_API_KEY: ${{ inputs.api_key }}
        LOCAMORPH_COMMIT_SHA: ${{ github.sha }}
      run: |
        JSON_LOG="$RUNNER_TEMP/locamorph-push.json"
        ERR_LOG="$RUNNER_TEMP/locamorph-push.err"

        EXIT_CODE=0
        locamorph upload --json >"$JSON_LOG" 2>"$ERR_LOG" || EXIT_CODE=$?
        cat "$ERR_LOG" >&2

        if [ $EXIT_CODE -ne 0 ]; then
          cat "$JSON_LOG" "$ERR_LOG" > "$RUNNER_TEMP/locamorph-push-combined.log"
          "$GITHUB_ACTION_PATH/scripts/report-failure.sh" \
            "locamorph upload" "$EXIT_CODE" \
            "$RUNNER_TEMP/locamorph-push-combined.log"
          exit $EXIT_CODE
        fi

        node "$GITHUB_ACTION_PATH/scripts/build-comment.js" \
          "$JSON_LOG" "$RUNNER_TEMP/locamorph-push-summary.md" || \
          echo "::warning::Could not render the push summary."

    # Action: pull-request
    - name: Pull translations and detect changes
      if: inputs.action == 'pull-request'
      id: pull-pr
      shell: bash
      env:
        LOCAMORPH_API_KEY: ${{ inputs.api_key }}
      run: |
        LOG="$RUNNER_TEMP/locamorph-download.log"

        # Stream the CLI output live so the real error is visible as it happens,
        # while still capturing it for change detection.
        locamorph download --verbose 2>&1 | tee "$LOG"
        EXIT_CODE=${PIPESTATUS[0]}
        OUTPUT=$(cat "$LOG")

        if echo "$OUTPUT" | grep -qE "^\s+[+~-] \["; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

        if [ $EXIT_CODE -ne 0 ]; then
          "$GITHUB_ACTION_PATH/scripts/report-failure.sh" \
            "locamorph download" "$EXIT_CODE" "$LOG"
          exit $EXIT_CODE
        fi

    - name: Create Pull Request
      if: inputs.action == 'pull-request' && steps.pull-pr.outputs.has_changes == 'true'
      id: create-pr
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ inputs.github_token }}
        title: ${{ inputs.pr_title }}
        branch: ${{ inputs.pr_branch }}
        base: ${{ inputs.pr_base }}
        body: ${{ inputs.pr_body }}
        commit-message: 'chore: sync translations from Locamorph'
        labels: ${{ inputs.pr_labels }}
        reviewers: ${{ inputs.pr_reviewers }}
        assignees: ${{ inputs.pr_assignees }}

    # Action: preview
    - name: Preview changes (dry-run)
      if: inputs.action == 'preview'
      id: preview
      shell: bash
      env:
        LOCAMORPH_API_KEY: ${{ inputs.api_key }}
        LOCAMORPH_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        JSON_LOG="$RUNNER_TEMP/locamorph-preview.json"
        ERR_LOG="$RUNNER_TEMP/locamorph-preview.err"
        BODY="$RUNNER_TEMP/locamorph-preview-comment.md"

        # Keep stdout (the JSON payload) separate from stderr (progress and
        # errors) so diagnostics never corrupt the JSON we parse.
        EXIT_CODE=0
        locamorph upload --dryrun --json >"$JSON_LOG" 2>"$ERR_LOG" || EXIT_CODE=$?

        # Surface the CLI's own diagnostics in the workflow log either way.
        cat "$ERR_LOG" >&2

        if [ $EXIT_CODE -ne 0 ]; then
          cat "$JSON_LOG" "$ERR_LOG" > "$RUNNER_TEMP/locamorph-preview-combined.log"
          "$GITHUB_ACTION_PATH/scripts/report-failure.sh" \
            "locamorph upload --dryrun" "$EXIT_CODE" \
            "$RUNNER_TEMP/locamorph-preview-combined.log"
          exit $EXIT_CODE
        fi

        # Builds the markdown body and sets has_preview_changes.
        node "$GITHUB_ACTION_PATH/scripts/build-comment.js" "$JSON_LOG" "$BODY"

        echo "preview_output<<LOCAMORPH_EOF" >> $GITHUB_OUTPUT
        cat "$BODY" >> $GITHUB_OUTPUT
        echo "LOCAMORPH_EOF" >> $GITHUB_OUTPUT
        echo "comment_body_file=$BODY" >> $GITHUB_OUTPUT

    # Find an existing preview comment so repeated pushes update one comment
    - name: Find existing preview comment
      if: inputs.action == 'preview' && github.event_name == 'pull_request'
      id: find-comment
      uses: peter-evans/find-comment@v3
      with:
        token: ${{ inputs.github_token }}
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: '<!-- locamorph-preview -->'

    - name: Comment preview on PR
      if: >-
        inputs.action == 'preview' &&
        github.event_name == 'pull_request' &&
        (steps.preview.outputs.has_preview_changes == 'true' ||
         inputs.comment_on_no_changes == 'true' ||
         steps.find-comment.outputs.comment-id != '')
      uses: peter-evans/create-or-update-comment@v4
      with:
        token: ${{ inputs.github_token }}
        issue-number: ${{ github.event.pull_request.number }}
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        edit-mode: replace
        body-path: ${{ steps.preview.outputs.comment_body_file }}
