name: 'Locamorph Sync Action'
description: 'Sync translations with Locamorph - pull, push, create PRs, or preview changes'
author: 'Locamorph'
branding:
  icon: 'globe'
  color: 'blue'

inputs:
  action:
    description: 'Action to perform: pull, push, pull-request, or preview'
    required: true
  api_key:
    description: 'Locamorph API key'
    required: true
  github_token:
    description: 'GitHub token (required for pull-request and preview actions)'
    required: false
  pr_title:
    description: 'PR title'
    required: false
    default: 'chore: update translations'
  pr_branch:
    description: 'PR branch name'
    required: false
    default: 'locamorph/translations-update'
  pr_base:
    description: 'Base branch for PR (defaults to repository default branch)'
    required: false
  pr_body:
    description: 'PR body/description'
    required: false
  pr_labels:
    description: 'Comma-separated labels'
    required: false
  pr_reviewers:
    description: 'Comma-separated reviewer usernames'
    required: false
  pr_assignees:
    description: 'Comma-separated assignee usernames'
    required: false

outputs:
  has_changes:
    description: 'Whether any translation files changed'
    value: ${{ steps.pull-pr.outputs.has_changes }}
  pr_url:
    description: 'URL of created PR (pull-request action only)'
    value: ${{ steps.create-pr.outputs.pull-request-url }}
  pr_number:
    description: 'PR number (pull-request action only)'
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  preview_output:
    description: 'Dry-run output (preview action only)'
    value: ${{ steps.preview.outputs.preview_output }}

runs:
  using: 'composite'
  steps:
    # Setup
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Locamorph CLI
      shell: bash
      run: |
        npm install -g @locamorph/cli@latest
        echo "Installed locamorph CLI version: $(locamorph --version)"

    # Action: pull
    - name: Pull translations
      if: inputs.action == 'pull'
      shell: bash
      env:
        LOCAMORPH_API_KEY: ${{ inputs.api_key }}
      run: locamorph download --verbose

    # Action: push
    - name: Push translations
      if: inputs.action == 'push'
      shell: bash
      env:
        LOCAMORPH_API_KEY: ${{ inputs.api_key }}
      run: locamorph upload --verbose

    # Action: pull-request
    - name: Pull translations and detect changes
      if: inputs.action == 'pull-request'
      id: pull-pr
      shell: bash
      env:
        LOCAMORPH_API_KEY: ${{ inputs.api_key }}
      run: |
        OUTPUT=$(locamorph download --verbose 2>&1) || true
        echo "$OUTPUT"

        if echo "$OUTPUT" | grep -qE "^\s+[+~-] \["; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request
      if: inputs.action == 'pull-request' && steps.pull-pr.outputs.has_changes == 'true'
      id: create-pr
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ inputs.github_token }}
        title: ${{ inputs.pr_title }}
        branch: ${{ inputs.pr_branch }}
        base: ${{ inputs.pr_base }}
        body: ${{ inputs.pr_body }}
        commit-message: 'chore: sync translations from Locamorph'
        labels: ${{ inputs.pr_labels }}
        reviewers: ${{ inputs.pr_reviewers }}
        assignees: ${{ inputs.pr_assignees }}

    # Action: preview
    - name: Preview changes (dry-run)
      if: inputs.action == 'preview'
      id: preview
      shell: bash
      env:
        LOCAMORPH_API_KEY: ${{ inputs.api_key }}
      run: |
        OUTPUT=$(locamorph upload --dryrun --verbose 2>&1) || true
        echo "$OUTPUT"

        echo "preview_output<<EOF" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if echo "$OUTPUT" | grep -qE "^\s+[+~-] \["; then
          echo "has_preview_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_preview_changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Comment preview on PR
      if: inputs.action == 'preview' && github.event_name == 'pull_request' && steps.preview.outputs.has_preview_changes == 'true'
      uses: peter-evans/create-or-update-comment@v4
      with:
        token: ${{ inputs.github_token }}
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          ## Translation Preview

          This is a preview of what translations would be uploaded if this PR is merged.

          ```
          ${{ steps.preview.outputs.preview_output }}
          ```

          ---
          *Generated by [Locamorph Sync Action](https://github.com/Locamorph/sync-action)*
